global:
  scrape_interval: 30s
  evaluation_interval: 30s
  # Unique per replica. The Querier uses these labels to match and deduplicate HA pairs.
  # Both replicas must share the same cluster label — only the replica value differs.
  external_labels:
    cluster: "local"
    replica: "0"

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: thanos-components
    static_configs:
      - targets:
          - "thanos-sidecar-a:10902"
          - "thanos-querier:10902"
          - "thanos-query-frontend:10902"
          - "thanos-store-gateway:10902"
          - "thanos-compactor:10902"
