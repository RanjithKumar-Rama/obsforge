groups:
  - name: kubernetes-resources
    rules:
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 5 > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
          description: "Container {{ $labels.container }} restarted multiple times in the last 15 minutes."

      - alert: ContainerMemoryNearLimit
        expr: >
          container_memory_usage_bytes{container!=""}
          / container_spec_memory_limit_bytes{container!=""}
          > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container }} memory above 90%"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is near its memory limit."

      - alert: NodeHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.instance }} CPU above 85%"

  - name: thanos
    rules:
      - alert: ThanosCompactorHalted
        expr: thanos_compact_halted == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Thanos Compactor has halted"
          description: "Compactor stopped working. Check for bucket corruption or config errors."

      - alert: ThanosStoreGatewayDown
        expr: up{job="thanos-store-gateway"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Thanos Store Gateway is down"
          description: "Historical metric queries will fail until this is restored."

      - alert: ThanosQueryHighLatency
        expr: >
          histogram_quantile(0.99,
            sum by (job, le) (
              rate(http_request_duration_seconds_bucket{job=~"thanos.*"}[5m])
            )
          ) > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Thanos query p99 latency above 30s"
          description: "Query performance degradation detected. Consider scaling or adding downsampled data."

  - name: recording-rules
    interval: 2m
    rules:
      - record: cluster:cpu_usage:rate5m
        expr: sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (namespace)

      - record: cluster:memory_usage_bytes
        expr: sum(container_memory_usage_bytes{container!=""}) by (namespace)
