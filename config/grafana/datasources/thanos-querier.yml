apiVersion: 1

datasources:
  - name: Thanos
    type: prometheus
    access: proxy
    # In docker-compose, this points to the query-frontend container.
    # In Kubernetes, the configmap at k8s/grafana/configmap.yml uses the FQDN.
    url: http://thanos-query-frontend:10902
    isDefault: true
    jsonData:
      timeInterval: 30s
      queryTimeout: 120s
      httpMethod: POST
