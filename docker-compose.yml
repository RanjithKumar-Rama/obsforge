# Local development stack for ObsForge.
# Uses MinIO as an S3 substitute — no cloud needed.
#
# Usage:
#   cp .env.example .env   (defaults work as-is for local)
#   docker compose up -d
#
# Grafana       → http://localhost:3000   (admin / $GRAFANA_ADMIN_PASSWORD)
# MinIO console → http://localhost:9001   (minioadmin / minioadmin)
# Prometheus A  → http://localhost:9090
# Thanos UI     → http://localhost:10902

networks:
  obsforge:
    driver: bridge

volumes:
  prometheus-a-data:
  prometheus-b-data:
  minio-data:
  grafana-data:
  thanos-store-data:
  thanos-compact-data:

services:

  # ── MinIO (local S3 substitute) 
  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - obsforge
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the 'thanos' bucket in MinIO on first boot.
  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-08-10Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/thanos;
      echo 'MinIO bucket ready.';
      "
    networks:
      - obsforge

  # ── Prometheus A (replica 0) 
  prometheus-a:
    image: prom/prometheus:v2.54.1
    container_name: prometheus-a
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.min-block-duration=2h
      - --storage.tsdb.max-block-duration=2h
      - --storage.tsdb.retention.time=4h
      - --web.enable-lifecycle
      - --web.listen-address=0.0.0.0:9090
    volumes:
      - ./config/prometheus/prometheus-a.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-a-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - obsforge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sidecar watches prometheus-a's data dir and ships sealed 2h blocks to MinIO.
  thanos-sidecar-a:
    image: quay.io/thanos/thanos:v0.36.1
    container_name: thanos-sidecar-a
    command:
      - sidecar
      - --tsdb.path=/prometheus
      - --prometheus.url=http://prometheus-a:9090
      - --objstore.config-file=/etc/thanos/bucket.yml
      - --http-address=0.0.0.0:10902
      - --grpc-address=0.0.0.0:10901
    volumes:
      - prometheus-a-data:/prometheus
      - ./config/thanos/bucket-minio.yml:/etc/thanos/bucket.yml:ro
    depends_on:
      prometheus-a:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - obsforge

  # ── Prometheus B (replica 1) 
  prometheus-b:
    image: prom/prometheus:v2.54.1
    container_name: prometheus-b
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.min-block-duration=2h
      - --storage.tsdb.max-block-duration=2h
      - --storage.tsdb.retention.time=4h
      - --web.enable-lifecycle
      - --web.listen-address=0.0.0.0:9090
    volumes:
      - ./config/prometheus/prometheus-b.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-b-data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - obsforge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  thanos-sidecar-b:
    image: quay.io/thanos/thanos:v0.36.1
    container_name: thanos-sidecar-b
    command:
      - sidecar
      - --tsdb.path=/prometheus
      - --prometheus.url=http://prometheus-b:9090
      - --objstore.config-file=/etc/thanos/bucket.yml
      - --http-address=0.0.0.0:10902
      - --grpc-address=0.0.0.0:10901
    volumes:
      - prometheus-b-data:/prometheus
      - ./config/thanos/bucket-minio.yml:/etc/thanos/bucket.yml:ro
    depends_on:
      prometheus-b:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - obsforge

  # ── Thanos Store Gateway 
  # Indexes the blocks in MinIO and serves historical queries.
  thanos-store-gateway:
    image: quay.io/thanos/thanos:v0.36.1
    container_name: thanos-store-gateway
    command:
      - store
      - --data-dir=/var/thanos/store
      - --objstore.config-file=/etc/thanos/bucket.yml
      - --http-address=0.0.0.0:10902
      - --grpc-address=0.0.0.0:10901
      - --index-cache-size=250MB
    volumes:
      - thanos-store-data:/var/thanos/store
      - ./config/thanos/bucket-minio.yml:/etc/thanos/bucket.yml:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks:
      - obsforge

  # ── Thanos Querier 
  # Single PromQL entry point. Fans out to sidecars + store gateway,
  # merges results, and deduplicates the two Prometheus replicas.
  thanos-querier:
    image: quay.io/thanos/thanos:v0.36.1
    container_name: thanos-querier
    command:
      - query
      - --http-address=0.0.0.0:10902
      - --grpc-address=0.0.0.0:10901
      - --query.replica-label=replica
      - --store=thanos-sidecar-a:10901
      - --store=thanos-sidecar-b:10901
      - --store=thanos-store-gateway:10901
      - --query.auto-downsampling
    depends_on:
      - thanos-sidecar-a
      - thanos-sidecar-b
      - thanos-store-gateway
    networks:
      - obsforge

  # ── Thanos Query Frontend 
  # Caches results and splits large range queries into parallel sub-queries.
  thanos-query-frontend:
    image: quay.io/thanos/thanos:v0.36.1
    container_name: thanos-query-frontend
    command:
      - query-frontend
      - --http-address=0.0.0.0:10902
      - --query-frontend.downstream-url=http://thanos-querier:10902
      - --query-range.split-interval=24h
      - --query-range.max-retries-per-request=5
      - --query-frontend.log-queries-longer-than=5s
    ports:
      - "10902:10902"
    depends_on:
      - thanos-querier
    networks:
      - obsforge

  # ── Thanos Compactor 
  # Merges 2h blocks into larger ones and creates 5m/1h downsampled copies.
  # --wait keeps it running for continuous compaction instead of exiting.
  thanos-compactor:
    image: quay.io/thanos/thanos:v0.36.1
    container_name: thanos-compactor
    command:
      - compact
      - --data-dir=/var/thanos/compact
      - --objstore.config-file=/etc/thanos/bucket.yml
      - --http-address=0.0.0.0:10902
      - --wait
      - --wait-interval=5m
      - --retention.resolution-raw=${RETENTION_RAW:-30d}
      - --retention.resolution-5m=${RETENTION_5M:-90d}
      - --retention.resolution-1h=${RETENTION_1H:-1y}
      - --compact.enable-vertical-compaction
      - --deduplication.func=penalty
    volumes:
      - thanos-compact-data:/var/thanos/compact
      - ./config/thanos/bucket-minio.yml:/etc/thanos/bucket.yml:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks:
      - obsforge

  # ── Grafana 
  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - thanos-query-frontend
    networks:
      - obsforge
