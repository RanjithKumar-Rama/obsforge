# Thanos Store Gateway
#
# Downloads index headers from S3 on startup and caches them locally.
# This lets it answer range queries over historical blocks without loading
# full chunks into memory upfront — only the requested chunk ranges are fetched.
#
# Cold start note: first startup after a large bucket can take a few minutes
# while index headers are downloaded. Queries for historical data will be slow
# during that window. A persistent volume for --data-dir mitigates this on restarts.

apiVersion: v1
kind: Service
metadata:
  name: thanos-store-gateway
  namespace: monitoring
  labels:
    app: thanos-store-gateway
    app.kubernetes.io/part-of: obsforge
spec:
  clusterIP: None  # headless — allows Querier to discover individual pods via DNS SRV
  ports:
    - name: grpc
      port: 10901
    - name: http
      port: 10902
  selector:
    app: thanos-store-gateway
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: thanos-store-gateway
  namespace: monitoring
  labels:
    app: thanos-store-gateway
    app.kubernetes.io/part-of: obsforge
spec:
  serviceName: thanos-store-gateway
  replicas: 1
  selector:
    matchLabels:
      app: thanos-store-gateway
  template:
    metadata:
      labels:
        app: thanos-store-gateway
        app.kubernetes.io/part-of: obsforge
    spec:
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: thanos-store-gateway
          image: quay.io/thanos/thanos:v0.36.1
          args:
            - store
            - --data-dir=/var/thanos/store
            - --objstore.config-file=/etc/thanos/bucket.yml
            - --http-address=0.0.0.0:10902
            - --grpc-address=0.0.0.0:10901
            - --index-cache-size=250MB
            - --chunk-pool-size=2GB
          ports:
            - name: grpc
              containerPort: 10901
            - name: http
              containerPort: 10902
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 10902
            # Allow time for index headers to download before declaring ready
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 10902
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /var/thanos/store
            - name: objstore
              mountPath: /etc/thanos
              readOnly: true
      volumes:
        - name: objstore
          secret:
            secretName: thanos-objstore

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3  # change to standard-rwo (GCP) or managed-premium (Azure)
        resources:
          requests:
            storage: 20Gi
