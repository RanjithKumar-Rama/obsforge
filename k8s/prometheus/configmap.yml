# Shared alerting + recording rules for both Prometheus replicas.
# See also k8s/thanos/ruler.yml for global rules that need cross-cluster data.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: obsforge
data:
  alerts.yml: |
    groups:
      - name: kubernetes-resources
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 5 > 0
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"

          - alert: ContainerMemoryNearLimit
            expr: >
              container_memory_usage_bytes{container!=""}
              / container_spec_memory_limit_bytes{container!=""}
              > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.container }} memory above 90%"

      - name: thanos
        rules:
          - alert: ThanosCompactorHalted
            expr: thanos_compact_halted == 1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Thanos Compactor has halted — check bucket permissions"

          - alert: ThanosStoreGatewayDown
            expr: up{job="thanos-store-gateway"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Store Gateway is down — historical queries will fail"

  recording.yml: |
    groups:
      - name: cluster-usage
        interval: 2m
        rules:
          - record: cluster:cpu_usage:rate5m
            expr: sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (namespace)
          - record: cluster:memory_usage_bytes
            expr: sum(container_memory_usage_bytes{container!=""}) by (namespace)
