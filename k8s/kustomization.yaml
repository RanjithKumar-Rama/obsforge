# Apply the full stack with: kubectl apply -k k8s/
# Note: use scripts/deploy.sh for ordered apply with readiness gates.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - namespace.yml
  - prometheus/rbac.yml
  - prometheus/configmap.yml
  - prometheus/statefulset-a.yml
  - prometheus/statefulset-b.yml
  - thanos/store-gateway.yml
  - thanos/querier.yml
  - thanos/query-frontend.yml
  - thanos/compactor.yml
  - thanos/ruler.yml
  - grafana/configmap.yml
  - grafana/deployment.yml
